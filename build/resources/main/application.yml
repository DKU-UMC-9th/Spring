spring:
  datasource:
    url: jdbc:mysql://localhost:3306/umc9th_db?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=UTF-8
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: create   # 첫 실행만 create -> 이후엔 update로 바꿔 써
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      # 스크립트 생성 옵션은 꺼두어도 됨 (DB에 바로 생성하니까)
      jakarta.persistence.schema-generation.database.action: create
      # 아래 3줄은 끄거나 놔둬도 무방
      # jakarta.persistence.schema-generation.create-source: metadata
      # jakarta.persistence.schema-generation.scripts.action: none
      # jakarta.persistence.schema-generation.scripts.create-target: src/main/resources/schema.sql

logging:
  level:
    org.hibernate.SQL: debug
