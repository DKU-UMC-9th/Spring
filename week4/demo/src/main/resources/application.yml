spring:
  application:
    name :demo

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver #mysql???..
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true